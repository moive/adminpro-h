<div
  class="background-modal animated fadeIn fast"
  [class.hidden]="modalImageService.hiddenModal"
>
  <div
    class="modal fade show animated bounceInDown"
    id="imageModal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="imageModalLabel"
    style="display: block"
  >
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title" id="imageModalLabel">Upload image</h4>
          <button
            type="button"
            class="close"
            data-dismiss="modal"
            aria-label="Close"
            (click)="closeModal()"
          >
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <div class="modal-body">
          <h3>Choose an image</h3>

          <div class="text-center">
            <img
              *ngIf="!imgTemp"
              [src]="modalImageService.img"
              class="img-avatar"
            />
            <img *ngIf="imgTemp" [src]="imgTemp" class="img-avatar" />
          </div>

          <input type="file" (change)="onChangeImage($event)" />
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-default"
            data-dismiss="modal"
            (click)="closeModal()"
          >
            Cancel
          </button>
          <button type="button" class="btn btn-primary" (click)="uploadImage()">
            Save foto
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
